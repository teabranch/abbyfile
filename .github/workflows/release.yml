name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Check formatting
        run: make fmtcheck

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race ./...

      - name: Cross-compile
        run: |
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            echo "Building agentfile-${os}-${arch}..."
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -o "dist/agentfile-${os}-${arch}" ./cmd/agentfile
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "agentfile ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
